<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1050" viewBox="0 0 1100 1050">
  <defs>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#34251f}.subtitle{font:15px Arial,sans-serif;fill:#6b5b53}
      .activity{fill:#eef7ff;stroke:#679fd0;stroke-width:2}.system{fill:#f4efff;stroke:#8268b2;stroke-width:2}
      .ai{fill:#fff0fb;stroke:#c76dbc;stroke-width:2}.admin{fill:#fff7ed;stroke:#c67c4e;stroke-width:2}
      .decision{fill:#fff;stroke:#679fd0;stroke-width:2}.text{font:15px Arial,sans-serif;fill:#26384a;text-anchor:middle;dominant-baseline:middle}
      .small{font:14px Arial,sans-serif;fill:#26384a;text-anchor:middle;dominant-baseline:middle}
      .edge{fill:none;stroke:#515b64;stroke-width:1.8;marker-end:url(#arrow)}.join{fill:none;stroke:#515b64;stroke-width:1.8}
      .label{font:700 12px Arial,sans-serif;fill:#59636c;text-anchor:middle}.branch{fill:none;stroke:#dacabe;stroke-width:1.5;stroke-dasharray:8 7}
      .branchTitle{font:700 14px Arial,sans-serif;fill:#896754;text-anchor:middle}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="#515b64"/></marker>
  </defs>

  <rect width="1100" height="1050" fill="#f8f3ed"/>
  <text x="550" y="40" class="title" text-anchor="middle">OVERALL ACTIVITY DIAGRAM</text>
  <text x="550" y="66" class="subtitle" text-anchor="middle">Coffee Shop Customer Service System</text>

  <circle cx="550" cy="100" r="12" fill="#111"/>
  <path d="M550 112 L550 138" class="edge"/>
  <rect x="400" y="138" width="300" height="50" rx="9" class="activity"/><text x="550" y="163" class="text">Open application</text>
  <path d="M550 188 L550 214" class="edge"/>
  <rect x="400" y="214" width="300" height="50" rx="9" class="activity"/><text x="550" y="239" class="text">Register or log in</text>
  <path d="M550 264 L550 290" class="edge"/>
  <rect x="370" y="290" width="360" height="50" rx="9" class="system"/><text x="550" y="315" class="text">Validate account with Firebase</text>
  <path d="M550 340 L550 365" class="edge"/>
  <polygon points="550,365 635,407 550,449 465,407" class="decision"/><text x="550" y="407" class="text">User role?</text>

  <rect x="70" y="470" width="430" height="390" rx="16" class="branch"/><text x="285" y="497" class="branchTitle">CUSTOMER</text>
  <rect x="600" y="470" width="430" height="390" rx="16" class="branch"/><text x="815" y="497" class="branchTitle">ADMINISTRATOR</text>

  <!-- Customer -->
  <path d="M465 407 L285 407 L285 520" class="edge"/><text x="375" y="394" class="label">Customer</text>
  <rect x="120" y="520" width="330" height="52" rx="9" class="ai"/><text x="285" y="546" class="text">Browse menu or ask Gemini</text>
  <path d="M285 572 L285 600" class="edge"/>
  <rect x="120" y="600" width="330" height="52" rx="9" class="activity"/><text x="285" y="626" class="text">Select product and add to cart</text>
  <path d="M285 652 L285 680" class="edge"/>
  <rect x="120" y="680" width="330" height="52" rx="9" class="activity"/><text x="285" y="706" class="text">Checkout and make payment</text>
  <path d="M285 732 L285 760" class="edge"/>
  <rect x="120" y="760" width="330" height="52" rx="9" class="system"/><text x="285" y="786" class="text">Save and track order in Firebase</text>

  <!-- Administrator -->
  <path d="M635 407 L815 407 L815 520" class="edge"/><text x="725" y="394" class="label">Administrator</text>
  <rect x="650" y="520" width="330" height="52" rx="9" class="admin"/><text x="815" y="546" class="text">Open Admin Dashboard</text>
  <path d="M815 572 L815 620" class="edge"/>
  <rect x="650" y="620" width="330" height="72" rx="9" class="admin"/>
  <text x="815" y="647" class="small">Manage orders, products,</text><text x="815" y="667" class="small">customers, and analytics</text>
  <path d="M815 692 L815 760" class="edge"/>
  <rect x="650" y="760" width="330" height="52" rx="9" class="system"/><text x="815" y="786" class="text">Read or update Firebase data</text>

  <!-- Merge and end -->
  <path d="M285 812 L285 890 L550 890" class="join"/>
  <path d="M815 812 L815 890 L550 890 L550 910" class="edge"/>
  <rect x="370" y="910" width="360" height="50" rx="9" class="activity"/><text x="550" y="935" class="text">Log out or close application</text>
  <path d="M550 960 L550 990" class="edge"/>
  <circle cx="550" cy="1007" r="17" fill="#fff" stroke="#111" stroke-width="2"/><circle cx="550" cy="1007" r="11" fill="#111"/>
</svg>
